name: Deploy to onlyanalyst.ru

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # silence Node 20 deprecation

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Prepare standalone package
        run: |
          cp -r data .next/standalone/
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          cp -r runner .next/standalone/

      - name: Deploy to staging dir
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: ".next/standalone/"
          target: "/opt/llm-arena-new/"
          strip_components: 2

      - name: Swap and preserve server data
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: OLLAMA_API_KEY
          script: |
            # Preserve server-generated data
            if [ -d /opt/llm-arena/data/prompt_lineage ]; then
              mkdir -p /opt/llm-arena-new/data/prompt_lineage
              cp -rn /opt/llm-arena/data/prompt_lineage/. /opt/llm-arena-new/data/prompt_lineage/
            fi
            if [ -d /opt/llm-arena/data/models.json ]; then
              cp -n /opt/llm-arena/data/models.json /opt/llm-arena-new/data/models.json
            fi
            if [ -f /opt/llm-arena/data/models.json ]; then
              cp -n /opt/llm-arena/data/models.json /opt/llm-arena-new/data/models.json
            fi
            if [ -d /opt/llm-arena/runner/state ]; then
              cp -rn /opt/llm-arena/runner/state/. /opt/llm-arena-new/runner/state/
            fi

            # Write pm2 ecosystem config with secrets (not committed to git)
            cat > /opt/llm-arena-new/ecosystem.config.js << EOFCONFIG
            module.exports = {
              apps: [
                {
                  name: "llm-arena",
                  script: "server.js",
                  cwd: "/opt/llm-arena",
                  env: { PORT: 3000, NODE_ENV: "production" }
                },
                {
                  name: "tournament-runner",
                  script: "runner/api.py",
                  interpreter: "python3",
                  cwd: "/opt/llm-arena",
                  autorestart: true,
                  env: {
                    PORT: "5001",
                    BASE_DIR: "/opt/llm-arena",
                    DATA_DIR: "/opt/llm-arena/data",
                    ARTICLES_DIR: "/opt/llm-arena/public/data/articles",
                    OLLAMA_HOST: "https://ollama.com",
                    OLLAMA_API_KEY: "$OLLAMA_API_KEY"
                  }
                }
              ]
            }
            EOFCONFIG

            # Atomic swap
            rm -rf /opt/llm-arena-old
            mv /opt/llm-arena /opt/llm-arena-old
            mv /opt/llm-arena-new /opt/llm-arena

            # Install Python runner deps
            apt-get install -y python3-flask python3-requests -qq 2>/dev/null || true

            # Start/restart both processes via ecosystem config
            pm2 startOrRestart /opt/llm-arena/ecosystem.config.js
            pm2 save
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
