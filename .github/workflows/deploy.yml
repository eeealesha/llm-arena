name: Deploy to onlyanalyst.ru

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare standalone package
        run: |
          cp -r data .next/standalone/
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/
          cp -r runner .next/standalone/

      - name: Deploy to staging dir
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: ".next/standalone/"
          target: "/opt/llm-arena-new/"
          strip_components: 2

      - name: Swap and preserve server data
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Preserve server-generated data (tournaments run on server, articles)
            if [ -d /opt/llm-arena/data/tournaments ]; then
              cp -rn /opt/llm-arena/data/tournaments/. /opt/llm-arena-new/data/tournaments/
            fi
            if [ -d /opt/llm-arena/public/data/articles ]; then
              mkdir -p /opt/llm-arena-new/public/data/articles
              cp -rn /opt/llm-arena/public/data/articles/. /opt/llm-arena-new/public/data/articles/
            fi
            if [ -d /opt/llm-arena/runner/state ]; then
              cp -rn /opt/llm-arena/runner/state/. /opt/llm-arena-new/runner/state/
            fi

            # Atomic swap
            rm -rf /opt/llm-arena-old
            mv /opt/llm-arena /opt/llm-arena-old
            mv /opt/llm-arena-new /opt/llm-arena

            # Install Python runner deps
            pip3 install -r /opt/llm-arena/runner/requirements.txt --quiet 2>/dev/null || true

            # Restart Next.js
            pm2 restart llm-arena

            # Restart Python runner if it exists
            pm2 restart tournament-runner 2>/dev/null || \
              pm2 start /opt/llm-arena/runner/api.py \
                --name tournament-runner \
                --interpreter python3 \
                --cwd /opt/llm-arena \
                -- --port 5001 2>/dev/null || true

            pm2 save
